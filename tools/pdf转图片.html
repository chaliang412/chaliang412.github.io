<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PDF2Pic · PDF转图片工具</title>

    <!-- PDF.js v3.x -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js">
    </script>
    <!-- JSZip v3.x (用于批量下载) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js">
    </script>

    <style>
        /* ===== 全局重置 & 变量 ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #4A6CF7;
            --primary-dark: #3651d4;
            --primary-light: #e8edfe;
            --bg: #f0f4f9;
            --card: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius: 14px;
            --shadow: 0 8px 30px rgba(0, 0, 0, 0.06);
            --transition: 0.25s ease;
            --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 24px 16px 60px;
        }

        .app {
            max-width: 1040px;
            width: 100%;
        }

        /* ===== 头部 ===== */
        .header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .header-icon {
            font-size: 36px;
            line-height: 1;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .header h1 span {
            color: var(--primary);
        }

        .header .sub {
            color: var(--text-muted);
            font-size: 15px;
            margin-left: 4px;
            font-weight: 400;
        }

        .badge-local {
            background: #d1fae5;
            color: #065f46;
            font-size: 13px;
            font-weight: 600;
            padding: 4px 14px;
            border-radius: 40px;
            margin-left: auto;
            white-space: nowrap;
        }

        /* ===== 卡片通用 ===== */
        .card {
            background: var(--card);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px 28px;
            margin-bottom: 24px;
            border: 1px solid var(--border);
            transition: border-color var(--transition);
        }

        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title .badge {
            background: var(--primary-light);
            color: var(--primary);
            font-size: 12px;
            font-weight: 600;
            padding: 0 10px;
            border-radius: 40px;
            line-height: 22px;
        }

        /* ===== 上传区域 ===== */
        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: var(--radius);
            padding: 44px 20px;
            text-align: center;
            cursor: pointer;
            transition: all var(--transition);
            background: #fafcff;
            position: relative;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: var(--primary);
            background: var(--primary-light);
        }

        .drop-zone .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 10px;
        }

        .drop-zone .main-text {
            font-size: 18px;
            font-weight: 600;
        }

        .drop-zone .sub-text {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 6px;
        }

        .drop-zone .file-info {
            margin-top: 14px;
            font-size: 14px;
            color: var(--primary);
            font-weight: 500;
        }

        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        /* ===== 设置网格 ===== */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 18px 24px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.2px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .form-group label .unit {
            font-weight: 400;
            color: var(--text-muted);
        }

        .form-group input,
        .form-group select {
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            background: #fff;
            transition: border-color var(--transition);
            color: var(--text);
            font-family: var(--font);
            width: 100%;
        }

        .form-group input:focus,
        .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(74, 108, 247, 0.12);
        }

        .form-group input[type="number"] {
            -moz-appearance: textfield;
        }
        .form-group input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
        }

        .form-group .hint {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .range-group {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .range-group .radio-group {
            display: flex;
            gap: 12px;
            font-size: 14px;
            align-items: center;
        }

        .range-group .radio-group label {
            font-weight: 400;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
        }

        .range-group .radio-group input[type="radio"] {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .range-inputs {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .range-inputs input {
            width: 60px;
            padding: 6px 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            text-align: center;
        }

        .range-inputs span {
            color: var(--text-muted);
            font-size: 14px;
        }

        .range-inputs input:disabled {
            background: #f1f5f9;
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* ===== 操作按钮 ===== */
        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }

        .btn {
            padding: 10px 28px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-family: var(--font);
        }

        .btn-primary {
            background: var(--primary);
            color: #fff;
        }

        .btn-primary:hover:not(:disabled) {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(74, 108, 247, 0.30);
        }

        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-secondary {
            background: #f1f5f9;
            color: var(--text);
        }

        .btn-secondary:hover:not(:disabled) {
            background: #e2e8f0;
        }

        .btn-success {
            background: #0b9e6e;
            color: #fff;
        }

        .btn-success:hover:not(:disabled) {
            background: #087a56;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(11, 158, 110, 0.30);
        }

        .btn-success:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ===== 进度 ===== */
        .progress-wrap {
            margin-top: 14px;
        }

        .progress-bar-bg {
            width: 100%;
            height: 8px;
            background: var(--border);
            border-radius: 40px;
            overflow: hidden;
            margin-top: 6px;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--primary), #7c9aff);
            border-radius: 40px;
            transition: width 0.3s ease;
        }

        .progress-status {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 4px;
            flex-wrap: wrap;
            gap: 4px;
        }

        .progress-status .highlight {
            color: var(--primary);
            font-weight: 600;
        }

        /* ===== 结果区域 ===== */
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
            gap: 18px;
            margin-top: 6px;
        }

        .result-item {
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            background: #fff;
            transition: box-shadow var(--transition);
        }

        .result-item:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.07);
        }

        .result-item .thumb {
            width: 100%;
            aspect-ratio: 1 / 1.4;
            object-fit: contain;
            background: #fafcff;
            display: block;
        }

        .result-item .info {
            padding: 10px 12px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 6px;
        }

        .result-item .info .name {
            font-size: 13px;
            font-weight: 500;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100px;
        }

        .result-item .info .size {
            font-size: 11px;
            color: var(--text-muted);
        }

        .result-item .info .dl-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 6px;
            transition: background var(--transition);
            color: var(--primary);
        }

        .result-item .info .dl-btn:hover {
            background: var(--primary-light);
        }

        .result-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }

        .empty-result {
            color: var(--text-muted);
            text-align: center;
            padding: 40px 20px;
            font-size: 15px;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 640px) {
            body {
                padding: 12px 10px 40px;
            }
            .card {
                padding: 18px 16px;
            }
            .header h1 {
                font-size: 20px;
            }
            .header .sub {
                font-size: 13px;
            }
            .badge-local {
                font-size: 11px;
                padding: 2px 10px;
            }
            .settings-grid {
                grid-template-columns: 1fr 1fr;
                gap: 12px;
            }
            .drop-zone {
                padding: 30px 16px;
            }
            .drop-zone .icon {
                font-size: 36px;
            }
            .drop-zone .main-text {
                font-size: 16px;
            }
            .result-grid {
                grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
                gap: 12px;
            }
            .range-group {
                flex-direction: column;
                align-items: stretch;
            }
            .range-inputs {
                justify-content: flex-start;
            }
            .actions .btn {
                flex: 1;
                justify-content: center;
                padding: 10px 16px;
                font-size: 14px;
            }
        }

        @media (max-width: 420px) {
            .settings-grid {
                grid-template-columns: 1fr;
            }
            .result-grid {
                grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
            }
        }

        /* ===== 辅助 ===== */
        .hidden {
            display: none !important;
        }

        .mt-8 {
            margin-top: 8px;
        }
        .mt-12 {
            margin-top: 12px;
        }

        .text-muted {
            color: var(--text-muted);
        }

        .flex-between {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }

        /* 加载脉冲 */
        .pulse-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--primary);
            animation: pulse 1.2s infinite;
            vertical-align: middle;
            margin-left: 6px;
        }
        @keyframes pulse {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.3;
                transform: scale(0.7);
            }
        }

        /* 错误提示 */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 10px;
            background: #fee2e2;
            color: #991b1b;
            border-left: 4px solid #dc2626;
        }

        .alert-success {
            background: #d1fae5;
            color: #065f46;
            border-left-color: #0b9e6e;
        }
    </style>
</head>
<body>

    <div class="app">
        <!-- ===== HEADER ===== -->
        <header class="header">
            <span class="header-icon">📄</span>
            <h1>PDF<span>2</span>Pic</h1>
            <span class="sub">PDF 转高质量图片</span>
            <span class="badge-local">🔒 本地处理 · 不上传</span>
        </header>

        <!-- ===== 上传卡片 ===== -->
        <div class="card" id="uploadCard">
            <div class="drop-zone" id="dropZone">
                <span class="icon">📤</span>
                <div class="main-text">拖拽 PDF 到此处，或点击选择文件</div>
                <div class="sub-text">支持 .pdf 格式 · 完全在浏览器中运行</div>
                <div class="file-info" id="fileInfo"></div>
                <input type="file" id="fileInput" accept=".pdf" />
            </div>
        </div>

        <!-- ===== 设置卡片 ===== -->
        <div class="card" id="settingsCard">
            <div class="card-title">
                ⚙️ 转换设置
                <span class="badge" id="pageCountBadge">未加载</span>
            </div>

            <div class="settings-grid">
                <!-- 输出格式 -->
                <div class="form-group">
                    <label>🖼️ 输出格式</label>
                    <select id="formatSelect">
                        <option value="png">PNG</option>
                        <option value="jpeg">JPEG</option>
                    </select>
                </div>

                <!-- DPI -->
                <div class="form-group">
                    <label>🔍 DPI <span class="unit">(分辨率)</span></label>
                    <input type="number" id="dpiInput" value="300" min="72" max="1200" step="10" />
                    <span class="hint">推荐 150–600，越高图片越大</span>
                </div>

                <!-- 页码范围 -->
                <div class="form-group" style="grid-column: span 1;">
                    <label>📑 页码范围</label>
                    <div class="range-group">
                        <div class="radio-group">
                            <label>
                                <input type="radio" name="rangeMode" value="all" checked />
                                全部
                            </label>
                            <label>
                                <input type="radio" name="rangeMode" value="custom" />
                                自定义
                            </label>
                        </div>
                        <div class="range-inputs">
                            <input type="number" id="rangeStart" value="1" min="1" disabled />
                            <span>—</span>
                            <input type="number" id="rangeEnd" value="1" min="1" disabled />
                        </div>
                    </div>
                </div>

                <!-- 文件名前缀 -->
                <div class="form-group">
                    <label>🏷️ 文件名前缀</label>
                    <input type="text" id="prefixInput" placeholder="自动使用PDF文件名" />
                    <span class="hint">留空则使用 PDF 文件名</span>
                </div>

                <!-- 起始编号 -->
                <div class="form-group">
                    <label>🔢 起始编号</label>
                    <input type="number" id="startNumInput" value="1" min="0" step="1" />
                    <span class="hint">页码从该数字开始递增</span>
                </div>
            </div>

            <!-- 操作按钮 -->
            <div class="actions">
                <button class="btn btn-primary" id="convertBtn">🚀 开始转换</button>
                <button class="btn btn-secondary" id="resetBtn">↻ 重置</button>
                <button class="btn btn-secondary hidden" id="clearResultBtn">🗑️ 清空结果</button>
            </div>

            <!-- 进度 -->
            <div class="progress-wrap hidden" id="progressWrap">
                <div class="progress-bar-bg">
                    <div class="progress-bar-fill" id="progressFill"></div>
                </div>
                <div class="progress-status">
                    <span id="progressText">准备中...</span>
                    <span id="progressPercent">0%</span>
                </div>
            </div>

            <!-- 错误/提示信息 -->
            <div id="messageArea"></div>
        </div>

        <!-- ===== 结果卡片 ===== -->
        <div class="card hidden" id="resultCard">
            <div class="card-title">
                🖼️ 转换结果
                <span class="badge" id="resultCountBadge">0 张</span>
            </div>

            <div id="resultContainer">
                <div class="empty-result">暂无图片，请先转换 PDF。</div>
            </div>

            <div class="result-actions hidden" id="resultActions">
                <button class="btn btn-success" id="downloadAllBtn">📦 下载全部 (ZIP)</button>
                <button class="btn btn-secondary" id="clearResultBtn2">🗑️ 清空结果</button>
            </div>
        </div>

        <!-- ===== Footer ===== -->
        <div style="text-align:center; margin-top:18px; font-size:13px; color:var(--text-muted);">
            基于 PDF.js 渲染 · 所有数据仅在本地处理，不会上传
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ============================================================
            //  1. DOM 引用
            // ============================================================
            const $ = (sel, ctx = document) => ctx.querySelector(sel);
            const $$ = (sel, ctx = document) => [...ctx.querySelectorAll(sel)];

            const fileInput = $('#fileInput');
            const dropZone = $('#dropZone');
            const fileInfo = $('#fileInfo');
            const pageCountBadge = $('#pageCountBadge');

            const formatSelect = $('#formatSelect');
            const dpiInput = $('#dpiInput');
            const rangeModeAll = $('input[name="rangeMode"][value="all"]');
            const rangeModeCustom = $('input[name="rangeMode"][value="custom"]');
            const rangeStart = $('#rangeStart');
            const rangeEnd = $('#rangeEnd');
            const prefixInput = $('#prefixInput');
            const startNumInput = $('#startNumInput');

            const convertBtn = $('#convertBtn');
            const resetBtn = $('#resetBtn');
            const clearResultBtn = $('#clearResultBtn');
            const clearResultBtn2 = $('#clearResultBtn2');

            const progressWrap = $('#progressWrap');
            const progressFill = $('#progressFill');
            const progressText = $('#progressText');
            const progressPercent = $('#progressPercent');

            const messageArea = $('#messageArea');
            const resultCard = $('#resultCard');
            const resultContainer = $('#resultContainer');
            const resultCountBadge = $('#resultCountBadge');
            const resultActions = $('#resultActions');
            const downloadAllBtn = $('#downloadAllBtn');

            // ============================================================
            //  2. 状态
            // ============================================================
            let pdfDoc = null; // PDF.js 文档对象
            let pdfFileName = ''; // 原始文件名 (不含扩展名)
            let totalPages = 0;
            let isConverting = false;
            let convertedBlobs = []; // 存储 { name, blob, size }
            let abortController = null; // 用于中断

            // ============================================================
            //  3. 工具函数
            // ============================================================
            function formatFileSize(bytes) {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / 1048576).toFixed(1) + ' MB';
            }

            function showMessage(msg, type = 'error') {
                messageArea.innerHTML =
                    `<div class="alert ${type === 'success' ? 'alert-success' : ''}">${msg}</div>`;
            }

            function clearMessage() {
                messageArea.innerHTML = '';
            }

            function setProgress(percent, text) {
                progressFill.style.width = Math.min(100, Math.max(0, percent)) + '%';
                progressPercent.textContent = Math.round(Math.min(100, Math.max(0, percent))) + '%';
                if (text) progressText.textContent = text;
            }

            function getScaleFromDpi(dpi) {
                return dpi / 72;
            }

            // ============================================================
            //  4. PDF 加载
            // ============================================================
            async function loadPDF(file) {
                clearMessage();
                const arrayBuffer = await file.arrayBuffer();
                const loadingTask = pdfjsLib.getDocument({ data: arrayBuffer });
                const doc = await loadingTask.promise;
                return doc;
            }

            // ============================================================
            //  5. 渲染单页 -> Blob
            // ============================================================
            async function renderPageToBlob(doc, pageIndex, scale, format) {
                const page = await doc.getPage(pageIndex + 1); // PDF.js 1-based
                const viewport = page.getViewport({ scale });

                // 用离屏 canvas
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = viewport.width;
                canvas.height = viewport.height;

                const renderContext = {
                    canvasContext: ctx,
                    viewport: viewport,
                };

                await page.render(renderContext).promise;

                // 转为 Blob
                const mimeType = format === 'jpeg' ? 'image/jpeg' : 'image/png';
                const blob = await new Promise((resolve) => {
                    canvas.toBlob((b) => resolve(b), mimeType, format === 'jpeg' ? 0.92 : undefined);
                });

                // 清理
                canvas.width = 0;
                canvas.height = 0;

                return blob;
            }

            // ============================================================
            //  6. 核心转换逻辑
            // ============================================================
            async function startConversion() {
                if (isConverting) return;
                if (!pdfDoc) {
                    showMessage('⚠️ 请先上传一个 PDF 文件。');
                    return;
                }

                // 读取参数
                const format = formatSelect.value;
                const dpi = parseInt(dpiInput.value, 10) || 300;
                const prefix = prefixInput.value.trim() || pdfFileName;
                const startNum = parseInt(startNumInput.value, 10) || 1;

                let pageIndices = [];
                const isAll = rangeModeAll.checked;
                if (isAll) {
                    pageIndices = Array.from({ length: totalPages }, (_, i) => i);
                } else {
                    const s = parseInt(rangeStart.value, 10) || 1;
                    const e = parseInt(rangeEnd.value, 10) || totalPages;
                    if (s < 1 || e > totalPages || s > e) {
                        showMessage(`⚠️ 页码范围无效 (1 ~ ${totalPages})`);
                        return;
                    }
                    for (let i = s - 1; i < e; i++) pageIndices.push(i);
                }

                if (pageIndices.length === 0) {
                    showMessage('⚠️ 没有页面需要转换。');
                    return;
                }

                // 准备 UI
                isConverting = true;
                convertBtn.disabled = true;
                convertBtn.textContent = '⏳ 转换中...';
                clearMessage();
                progressWrap.classList.remove('hidden');
                setProgress(0, `准备转换 ${pageIndices.length} 页...`);

                // 清空旧结果
                clearResults();

                const scale = getScaleFromDpi(dpi);
                const total = pageIndices.length;
                const blobs = [];

                // 使用 AbortController 支持中断（此处简单实现，仅用于标记）
                abortController = new AbortController();

                try {
                    for (let idx = 0; idx < total; idx++) {
                        if (abortController.signal.aborted) {
                            setProgress((idx / total) * 100, '⏹️ 已中断');
                            break;
                        }

                        const pageIndex = pageIndices[idx];
                        const pageNum = startNum + idx;
                        const fileName =
                            `${prefix}_${String(pageNum).padStart(4, '0')}.${format}`;

                        setProgress(
                            (idx / total) * 100,
                            `正在转换第 ${idx+1}/${total} 页 (原第 ${pageIndex+1} 页) ...`
                        );

                        try {
                            const blob = await renderPageToBlob(pdfDoc, pageIndex, scale, format);
                            blobs.push({
                                name: fileName,
                                blob: blob,
                                size: blob.size,
                                pageIndex: pageIndex,
                            });
                        } catch (err) {
                            console.warn(`第 ${pageIndex+1} 页渲染失败:`, err);
                            // 继续处理其他页
                            continue;
                        }
                    }

                    // 存储结果
                    convertedBlobs = blobs;

                    // 显示结果
                    if (blobs.length > 0) {
                        renderResults(blobs);
                        resultCard.classList.remove('hidden');
                        resultActions.classList.remove('hidden');
                        resultCountBadge.textContent = `${blobs.length} 张`;
                        showMessage(`✅ 成功转换 ${blobs.length} 张图片！`, 'success');
                    } else {
                        showMessage('⚠️ 没有成功转换任何页面，请检查 PDF 是否有效。');
                    }

                } catch (err) {
                    console.error(err);
                    showMessage('❌ 转换出错: ' + err.message);
                } finally {
                    isConverting = false;
                    convertBtn.disabled = false;
                    convertBtn.textContent = '🚀 开始转换';
                    abortController = null;
                    if (!abortController?.signal?.aborted) {
                        setProgress(100, '✅ 转换完成');
                    }
                }
            }

            // ============================================================
            //  7. 渲染结果
            // ============================================================
            function renderResults(blobs) {
                resultContainer.innerHTML = '';
                const grid = document.createElement('div');
                grid.className = 'result-grid';

                blobs.forEach((item, index) => {
                    const url = URL.createObjectURL(item.blob);

                    const div = document.createElement('div');
                    div.className = 'result-item';

                    const img = document.createElement('img');
                    img.className = 'thumb';
                    img.src = url;
                    img.alt = item.name;
                    img.loading = 'lazy';

                    const info = document.createElement('div');
                    info.className = 'info';

                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'name';
                    nameSpan.title = item.name;
                    nameSpan.textContent = item.name;

                    const sizeSpan = document.createElement('span');
                    sizeSpan.className = 'size';
                    sizeSpan.textContent = formatFileSize(item.size);

                    const dlBtn = document.createElement('button');
                    dlBtn.className = 'dl-btn';
                    dlBtn.innerHTML = '⬇️';
                    dlBtn.title = '下载此图片';
                    dlBtn.addEventListener('click', (e) => {
                        e.stopPropagation();
                        downloadSingle(item);
                    });

                    info.appendChild(nameSpan);
                    info.appendChild(sizeSpan);
                    info.appendChild(dlBtn);

                    div.appendChild(img);
                    div.appendChild(info);
                    grid.appendChild(div);
                });

                resultContainer.appendChild(grid);
            }

            function downloadSingle(item) {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(item.blob);
                a.download = item.name;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                setTimeout(() => URL.revokeObjectURL(a.href), 5000);
            }

            function clearResults() {
                // 释放所有对象URL
                const imgs = resultContainer.querySelectorAll('.result-item .thumb');
                imgs.forEach(img => {
                    if (img.src && img.src.startsWith('blob:')) {
                        URL.revokeObjectURL(img.src);
                    }
                });
                convertedBlobs = [];
                resultContainer.innerHTML = `<div class="empty-result">暂无图片，请先转换 PDF。</div>`;
                resultCard.classList.add('hidden');
                resultActions.classList.add('hidden');
                resultCountBadge.textContent = '0 张';
            }

            // ============================================================
            //  8. 批量下载 ZIP
            // ============================================================
            async function downloadAllAsZip() {
                if (convertedBlobs.length === 0) {
                    showMessage('⚠️ 没有图片可下载。');
                    return;
                }

                const zip = new JSZip();
                const folder = zip.folder(pdfFileName || 'pdf_images');

                convertedBlobs.forEach(item => {
                    folder.file(item.name, item.blob);
                });

                try {
                    downloadAllBtn.disabled = true;
                    downloadAllBtn.textContent = '⏳ 打包中...';
                    const zipBlob = await zip.generateAsync({ type: 'blob' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(zipBlob);
                    a.download = `${pdfFileName || 'pdf_images'}.zip`;
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    setTimeout(() => URL.revokeObjectURL(a.href), 10000);
                    showMessage(`✅ ZIP 包已生成 (${formatFileSize(zipBlob.size)})`, 'success');
                } catch (err) {
                    console.error(err);
                    showMessage('❌ 打包失败: ' + err.message);
                } finally {
                    downloadAllBtn.disabled = false;
                    downloadAllBtn.textContent = '📦 下载全部 (ZIP)';
                }
            }

            // ============================================================
            //  9. 重置
            // ============================================================
            function resetAll() {
                if (isConverting) {
                    if (abortController) {
                        abortController.abort();
                    }
                    isConverting = false;
                    convertBtn.disabled = false;
                    convertBtn.textContent = '🚀 开始转换';
                }

                clearResults();
                clearMessage();
                progressWrap.classList.add('hidden');
                setProgress(0, '');

                // 重置表单
                formatSelect.value = 'png';
                dpiInput.value = '300';
                rangeModeAll.checked = true;
                rangeStart.disabled = true;
                rangeEnd.disabled = true;
                rangeStart.value = '1';
                rangeEnd.value = '1';
                prefixInput.value = '';
                startNumInput.value = '1';

                // 重置文件状态
                pdfDoc = null;
                pdfFileName = '';
                totalPages = 0;
                pageCountBadge.textContent = '未加载';
                fileInfo.textContent = '';
                fileInput.value = '';
                dropZone.classList.remove('dragover');

                // 重置结果区
                resultCard.classList.add('hidden');
                resultActions.classList.add('hidden');
                resultCountBadge.textContent = '0 张';
                resultContainer.innerHTML = `<div class="empty-result">暂无图片，请先转换 PDF。</div>`;
            }

            // ============================================================
            //  10. 事件绑定
            // ============================================================

            // -- 文件上传 --
            fileInput.addEventListener('change', async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                await handleFile(file);
            });

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });

            dropZone.addEventListener('dragleave', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
            });

            dropZone.addEventListener('drop', async (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                const file = e.dataTransfer.files[0];
                if (!file) return;
                // 同步到 fileInput
                const dt = new DataTransfer();
                dt.items.add(file);
                fileInput.files = dt.files;
                await handleFile(file);
            });

            // 点击dropZone任何位置触发文件选择 (input已覆盖全区域)
            // 但如果有内部元素阻挡，确保input可穿透

            async function handleFile(file) {
                if (file.type !== 'application/pdf' && !file.name.toLowerCase().endsWith('.pdf')) {
                    showMessage('⚠️ 请上传 PDF 文件。');
                    return;
                }

                clearMessage();
                fileInfo.textContent = `📄 ${file.name} (${formatFileSize(file.size)})`;

                try {
                    pdfDoc = await loadPDF(file);
                    totalPages = pdfDoc.numPages;
                    pdfFileName = file.name.replace(/\.[^.]+$/, '');
                    pageCountBadge.textContent = `共 ${totalPages} 页`;

                    // 自动填充前缀
                    if (!prefixInput.value) {
                        prefixInput.value = pdfFileName;
                    }

                    // 更新范围结束值
                    rangeEnd.value = totalPages;
                    rangeEnd.max = totalPages;
                    rangeStart.max = totalPages;

                    // 启用自定义范围输入
                    if (rangeModeCustom.checked) {
                        rangeStart.disabled = false;
                        rangeEnd.disabled = false;
                    }

                    showMessage(`✅ 已加载 "${file.name}"，共 ${totalPages} 页`, 'success');

                } catch (err) {
                    console.error(err);
                    showMessage('❌ 无法加载 PDF: ' + err.message);
                    pdfDoc = null;
                    totalPages = 0;
                    pageCountBadge.textContent = '加载失败';
                    fileInfo.textContent = '❌ 加载失败';
                }
            }

            // -- 范围切换 --
            rangeModeAll.addEventListener('change', () => {
                rangeStart.disabled = true;
                rangeEnd.disabled = true;
            });
            rangeModeCustom.addEventListener('change', () => {
                rangeStart.disabled = false;
                rangeEnd.disabled = false;
                if (totalPages > 0) {
                    rangeStart.value = 1;
                    rangeEnd.value = totalPages;
                }
            });

            // -- 转换 --
            convertBtn.addEventListener('click', startConversion);

            // -- 重置 --
            resetBtn.addEventListener('click', resetAll);

            // -- 清空结果 --
            clearResultBtn.addEventListener('click', clearResults);
            clearResultBtn2.addEventListener('click', clearResults);

            // -- 下载全部 --
            downloadAllBtn.addEventListener('click', downloadAllAsZip);

            // -- 键盘快捷键: Enter触发转换 --
            document.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && e.ctrlKey) {
                    e.preventDefault();
                    startConversion();
                }
            });

            // ============================================================
            //  11. 初始化
            // ============================================================
            // 设置 PDF.js worker
            pdfjsLib.GlobalWorkerOptions.workerSrc =
                'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

            // 默认隐藏进度
            progressWrap.classList.add('hidden');

            // 显示初始提示
            console.log('📄 PDF2Pic 已就绪 — 上传 PDF 开始转换');

        })();
    </script>
</body>
</html>
