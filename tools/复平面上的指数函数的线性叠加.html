<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>复平面上的指数函数的线性叠加</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          sans-serif;
        margin: 0;
        padding: 20px;
        background: #f9f9f9;
        color: #333;
      }
      .container {
        max-width: 1200px;
        margin: 0 auto;
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
      }
      .panel {
        background: white;
        padding: 16px;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        flex: 1;
        min-width: 300px;
      }
      h1 {
        margin-top: 0;
        font-size: 1.4rem;
      }
      canvas {
        width: 100%;
        height: 500px;
        background: white;
        border: 1px solid #ddd;
        border-radius: 4px;
      }
      .controls {
        margin-top: 12px;
      }
      button {
        margin: 4px;
        padding: 6px 12px;
        background: #4caf50;
        color: white;
        border: none;
        border-radius: 4px;
        cursor: pointer;
      }
      button:hover {
        background: #45a049;
      }
      button:disabled {
        background: #ccc;
        cursor: not-allowed;
      }
      .component {
        display: flex;
        gap: 8px;
        margin: 8px 0;
        align-items: center;
      }
      input[type="number"] {
        width: 80px;
        padding: 4px;
        border: 1px solid #ccc;
        border-radius: 4px;
      }
      label {
        font-weight: bold;
        margin-right: 8px;
      }
      .speed-control {
        margin-top: 12px;
      }
      .math-formula {
        display: inline-block;
        vertical-align: -2.5ex; /* 关键：对齐文本基线 */
        line-height: 0; /* 防止撑高行高 */
        fill: currentColor; /* 继承文字颜色 */
        stroke: currentColor;
      }
    </style>
  </head>
  <body>

        </p>

        <div id="components"></div>

        <div class="controls">
          <button onclick="addComponent()">+ 添加分量</button>
          <button onclick="resetComponents()">重置示例</button>
        </div>

        <div class="speed-control">
          <label for="speed">动画速度：</label>
          <input
            type="range"
            id="speed"
            min="0.1"
            max="2"
            step="0.1"
            value="1"
            oninput="updateSpeed()"
          />
          <span id="speed-value">1.0x</span>
        </div>

        <div class="controls">
          <button onclick="togglePlay()" id="playBtn">⏸ 暂停</button>
          <button onclick="clearTrace()">清除轨迹</button>
        </div>
      </div>

      <div class="panel">
        <canvas id="plot" width="800" height="600"></canvas>
      </div>
    </div>

    <script>
      // ======================
      // 全局状态
      // ======================
      let components = [
        { c: 1.0, p: 1.0 },
        { c: 0.6, p: 3.0 },
      ];
      let isPlaying = true;
      let animationSpeed = 1.0;
      let time = 0;
      let trace = []; // 存储轨迹点 {x, y}
      const maxTraceLength = 2000;

      const canvas = document.getElementById("plot");
      const ctx = canvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      canvas.width = canvas.clientWidth * dpr;
      canvas.height = canvas.clientHeight * dpr;
      ctx.scale(dpr, dpr);

      // ======================
      // UI 控制
      // ======================
      function addComponent() {
        components.push({ c: 0.5, p: 2.0 });
        renderComponents();
      }

      function removeComponent(index) {
        if (components.length <= 1) return;
        components.splice(index, 1);
        renderComponents();
      }

      function updateComponent(index, field, value) {
        components[index][field] = parseFloat(value) || 0;
      }

      function renderComponents() {
        const container = document.getElementById("components");
        container.innerHTML = "";
        components.forEach((comp, i) => {
          const div = document.createElement("div");
          div.className = "component";
          div.innerHTML = `
          <span>${i + 1}:</span>
          <label for="c${i}"><svg xmlns="http://www.w3.org/2000/svg" width="0.98ex" height="1.025ex" viewBox="0 -442 433 453" xmlns:xlink="http://www.w3.org/1999/xlink" aria-hidden="true" style=""><defs><path id="MJX-49-TEX-I-1D450" d="M34 159Q34 268 120 355T306 442Q362 442 394 418T427 355Q427 326 408 306T360 285Q341 285 330 295T319 325T330 359T352 380T366 386H367Q367 388 361 392T340 400T306 404Q276 404 249 390Q228 381 206 359Q162 315 142 235T121 119Q121 73 147 50Q169 26 205 26H209Q321 26 394 111Q403 121 406 121Q410 121 419 112T429 98T420 83T391 55T346 25T282 0T202 -11Q127 -11 81 37T34 159Z"></path></defs><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-mml-node="math"><g data-mml-node="mi"><use xlink:href="#MJX-49-TEX-I-1D450"></use></g></g></g></svg>:</label>
          <input type="number" id="c${i}" value="${comp.c}" step="0.1"
                 oninput="updateComponent(${i}, 'c', this.value)">
          <label for="p${i}"><svg xmlns="http://www.w3.org/2000/svg" width="1.138ex" height="1.439ex" viewBox="0 -442 503 636" xmlns:xlink="http://www.w3.org/1999/xlink" aria-hidden="true" style=""><defs><path id="MJX-50-TEX-I-1D45D" d="M23 287Q24 290 25 295T30 317T40 348T55 381T75 411T101 433T134 442Q209 442 230 378L240 387Q302 442 358 442Q423 442 460 395T497 281Q497 173 421 82T249 -10Q227 -10 210 -4Q199 1 187 11T168 28L161 36Q160 35 139 -51T118 -138Q118 -144 126 -145T163 -148H188Q194 -155 194 -157T191 -175Q188 -187 185 -190T172 -194Q170 -194 161 -194T127 -193T65 -192Q-5 -192 -24 -194H-32Q-39 -187 -39 -183Q-37 -156 -26 -148H-6Q28 -147 33 -136Q36 -130 94 103T155 350Q156 355 156 364Q156 405 131 405Q109 405 94 377T71 316T59 280Q57 278 43 278H29Q23 284 23 287ZM178 102Q200 26 252 26Q282 26 310 49T356 107Q374 141 392 215T411 325V331Q411 405 350 405Q339 405 328 402T306 393T286 380T269 365T254 350T243 336T235 326L232 322Q232 321 229 308T218 264T204 212Q178 106 178 102Z"></path></defs><g stroke="currentColor" fill="currentColor" stroke-width="0" transform="matrix(1 0 0 -1 0 0)"><g data-mml-node="math"><g data-mml-node="mi"><use xlink:href="#MJX-50-TEX-I-1D45D"></use></g></g></g></svg>:</label>
          <input type="number" id="p${i}" value="${comp.p}" step="0.1"
                 oninput="updateComponent(${i}, 'p', this.value)">
          <button onclick="removeComponent(${i})" ${
            components.length <= 1 ? "disabled" : ""
          }>−</button>
        `;
          container.appendChild(div);
        });
      }

      function resetComponents() {
        components = [
          { c: 1.0, p: 1.0 },
          { c: 0.6, p: 3.0 },
        ];
        trace = [];
        time = 0;
        renderComponents();
      }

      function togglePlay() {
        isPlaying = !isPlaying;
        document.getElementById("playBtn").textContent = isPlaying
          ? "⏸ 暂停"
          : "▶ 播放";
      }

      function clearTrace() {
        trace = [];
      }

      function updateSpeed() {
        animationSpeed = parseFloat(document.getElementById("speed").value);
        document.getElementById("speed-value").textContent =
          animationSpeed.toFixed(1) + "x";
      }

      // ======================
      // 数学与绘图
      // ======================
      function hsvToRgb(h, s, v) {
        let r, g, b;
        const i = Math.floor(h * 6);
        const f = h * 6 - i;
        const p = v * (1 - s);
        const q = v * (1 - f * s);
        const t = v * (1 - (1 - f) * s);
        switch (i % 6) {
          case 0:
            r = v;
            g = t;
            b = p;
            break;
          case 1:
            r = q;
            g = v;
            b = p;
            break;
          case 2:
            r = p;
            g = v;
            b = t;
            break;
          case 3:
            r = p;
            g = q;
            b = v;
            break;
          case 4:
            r = t;
            g = p;
            b = v;
            break;
          case 5:
            r = v;
            g = p;
            b = q;
            break;
        }
        return `rgb(${Math.round(r * 255)}, ${Math.round(
          g * 255
        )}, ${Math.round(b * 255)})`;
      }

      function drawCircle(cx, cy, radius, color) {
        ctx.strokeStyle = color;
        ctx.lineWidth = 1;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      function drawArrow(x1, y1, x2, y2, color) {
        const dx = x2 - x1;
        const dy = y2 - y1;
        const len = Math.hypot(dx, dy);
        if (len === 0) return;

        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();

        // 箭头头（简化）
        const angle = Math.atan2(dy, dx);
        const headLen = 8;
        ctx.save();
        ctx.translate(x2, y2);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(-headLen, -headLen / 2);
        ctx.lineTo(-headLen, headLen / 2);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }

      function animate() {
        if (isPlaying) {
          time += 0.05 * animationSpeed;
        }

        // 清屏
        ctx.clearRect(0, 0, canvas.clientWidth, canvas.clientHeight);

        const centerX = canvas.clientWidth / 2;
        const centerY = canvas.clientHeight / 2;
        const scale =
          (Math.min(centerX, centerY) * 0.8) /
          (components.reduce((sum, c) => sum + Math.abs(c.c), 0) || 1);

        // 计算所有分量
        let currentX = 0,
          currentY = 0;
        const points = [];

        for (let i = 0; i < components.length; i++) {
          const { c, p } = components[i];
          const angle = time * p;
          const dx = c * Math.cos(angle);
          const dy = c * Math.sin(angle);

          // 绘制旋转圆
          const cx = centerX + currentX * scale;
          const cy = centerY - currentY * scale; // y轴反向（数学坐标）
          drawCircle(cx, cy, Math.abs(c) * scale, "#aaa");

          // 更新终点
          currentX += dx;
          currentY += dy;
          points.push({ x: currentX, y: currentY });

          // 绘制箭头
          const startX = centerX + (currentX - dx) * scale;
          const startY = centerY - (currentY - dy) * scale;
          const endX = centerX + currentX * scale;
          const endY = centerY - currentY * scale;

          const hue = i / Math.max(1, components.length - 1);
          const color = hsvToRgb(hue, 0.8, 0.8);
          drawArrow(startX, startY, endX, endY, color);
        }

        // 当前合成点
        const finalX = centerX + currentX * scale;
        const finalY = centerY - currentY * scale;
        ctx.fillStyle = "red";
        ctx.beginPath();
        ctx.arc(finalX, finalY, 5, 0, Math.PI * 2);
        ctx.fill();

        // 轨迹
        trace.push({ x: currentX, y: currentY });
        if (trace.length > maxTraceLength) trace.shift();

        if (trace.length > 1) {
          ctx.strokeStyle = "#9999FF";//steelblue
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(
            centerX + trace[0].x * scale,
            centerY - trace[0].y * scale
          );
          for (let i = 1; i < trace.length; i++) {
            ctx.lineTo(
              centerX + trace[i].x * scale,
              centerY - trace[i].y * scale
            );
          }
          ctx.stroke();
        }

        requestAnimationFrame(animate);
      }

      // ======================
      // 初始化
      // ======================
      renderComponents();
      animate();
    </script>
